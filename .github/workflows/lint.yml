name: lint
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  python:
    name: ruff + mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: install linters
        run: pip install ruff mypy
      - name: ruff (config in pyproject.toml)
        run: ruff check cogpin.py tests
      - name: mypy (engine only — the public surface)
        run: mypy cogpin.py

  actions:
    name: actionlint + zizmor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: actionlint
        uses: raven-actions/actionlint@v2
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: zizmor (workflow-security static analysis; policy in .github/zizmor.yml)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          pip install zizmor
          zizmor --min-confidence=medium .github/workflows/ action.yml
