name: self-gate
# ratchet gates its OWN repo with its own dogfood ratchet.toml — the change layer,
# authoritative + base-pinned, ignoring RATCHET_BYPASS. This now runs THROUGH the
# composite action (`uses: ./`), so the action's gh-facts wiring (PR body, reviews
# via GraphQL, checks, approvals, head-sha, author) is itself dogfooded end-to-end —
# exercising the reviewer-identity / checks path a hand-rolled `check` never did.
# (Tests + lint + plugin packaging live in ci.yml / lint.yml / plugin-validate.yml;
# this job is the DoD self-application only.)
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read
  checks: read

jobs:
  definition-of-done:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need history for the base..HEAD range + base-pinning
      - uses: ./ # the composite action at the repo root; engine=pinned → ./ratchet.py
