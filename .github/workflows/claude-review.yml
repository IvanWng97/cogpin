name: claude review

# Advisory AI code review (cogpin's two-lens cadence, prompt in .github/prompts/pr_review_rules.md).
# It POSTS findings; it NEVER blocks the merge — the mechanical gates (definition-of-done / ci /
# lint / plugin-validate) are the teeth. That split IS cogpin's thesis: judgment advises, facts
# block. Ships dark: until a CLAUDE_CODE_OAUTH_TOKEN repo secret exists the steps skip and the job
# stays green, so this can land before the secret and activate the moment it's added.

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write
  actions: read

concurrency:
  group: claude-review-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    # Two trust-gated entry points, both restricted to this repo's own trusted actors so the
    # secret-bearing, write-scoped job can never be fired by (or over the diff of) an untrusted
    # fork:
    #   • pull_request — same-repo head only (forks can't read the secret anyway), no drafts,
    #     no dependabot;
    #   • issue_comment `/claude-review` — ONLY from an OWNER/MEMBER/COLLABORATOR. Without this
    #     association gate, any drive-by commenter could spend the budget and feed
    #     attacker-controlled fork-PR text to an LLM holding `pull-requests: write`.
    if: >
      (github.event_name == 'pull_request' &&
       github.actor != 'dependabot[bot]' &&
       github.event.pull_request.draft == false &&
       github.event.pull_request.head.repo.full_name == github.repository) ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '/claude-review') &&
       contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      HAS_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' }}
    steps:
      - name: Gate on the token (ship-dark until the secret is set)
        id: gate
        run: |
          if [ "$HAS_TOKEN" = "true" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::CLAUDE_CODE_OAUTH_TOKEN not set — skipping AI review. Add the secret (\`claude setup-token\`) to enable."
          fi

      - name: Checkout
        if: steps.gate.outputs.enabled == 'true'
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Load review prompt
        id: prompt
        if: steps.gate.outputs.enabled == 'true'
        run: |
          {
            echo 'content<<PROMPT_EOF'
            cat .github/prompts/pr_review_rules.md
            echo 'PROMPT_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Review
        if: steps.gate.outputs.enabled == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: ${{ steps.prompt.outputs.content }}
          track_progress: true
          claude_args: >-
            --max-turns 30
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(grep:*),Bash(rg:*),Read,Glob,Grep"
