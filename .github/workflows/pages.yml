name: pages

# Build the Astro tutorial site (site/) and deploy it to GitHub Pages.
# The playground bundles the REAL engine: prebuild vendors ../ratchet.py into
# site/public/ratchet.py, so the page runs the exact shipped engine via Pyodide.
on:
  push:
    branches: [main]
    paths: ['site/**', 'ratchet.py', 'assets/**', '.github/workflows/pages.yml']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; don't cancel an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 26 # latest (Current); 24 = Active LTS "Krypton". astro 7 needs >=22.12
          cache: npm
          cache-dependency-path: site/package-lock.json
      - run: npm ci
      - run: npm run build # prebuild runs sync-engine (vendors ratchet.py + glue.py + assets)
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
