name: cogpin
description: >-
  Definition-of-Done gate for AI coding agents. Runs the rev-pinned cogpin engine
  over your base-pinned cogpin.toml — neither the judge (engine) nor the policy
  (config) is read from the PR head, so only ungameable diff/PR facts decide.
branding:
  icon: check-square
  color: purple

inputs:
  engine:
    description: >-
      Which engine evaluates: 'pinned' (the action's own rev-pinned cogpin.py —
      recommended; a PR can't self-neuter it) or 'vendored' (the consumer's HEAD
      .cogpin/cogpin.py — only if you pin .cogpin/** via protected_path + branch
      protection).
    default: pinned
  config-dir:
    description: Directory holding cogpin.toml (and, for engine=vendored, .cogpin/).
    default: "."
  default-branch:
    description: >-
      Trusted base branch — fetched for the diff AND passed to the engine as the base-pin
      name, so the base can't be redirected by the PR-head config (`--default-branch`).
    default: ${{ github.event.repository.default_branch }}
  python-version:
    description: Python for the engine (needs >= 3.11 for tomllib).
    default: "3.13"
  report-only:
    description: >-
      Rollout switch: 'true' runs the AUTHORITATIVE policy but always exits 0 (findings are
      reported + a ::warning:: annotation is emitted, the job never fails) — ride it over real
      PRs, then flip to 'false' to enforce. NOTE: on the pull_request trigger the workflow YAML
      is read from the PR head, so a PR could flip this on for itself — pair with branch
      protection / CODEOWNERS on .github/workflows/** (or pull_request_target). Distinct from a
      per-check severity="warn" (that's permanent + per-check; this is global + temporary).
    default: "false"

runs:
  using: composite
  steps:
    - uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}

    - name: resolve engine + fetch base
      id: prep
      shell: bash
      env:
        ENGINE_INPUT: ${{ inputs.engine }}
        ACTION_PATH: ${{ github.action_path }}
        CONFIG_DIR: ${{ inputs.config-dir }}
        DEFAULT_BRANCH: ${{ inputs.default-branch }}
      run: |
        set -euo pipefail
        if [ "$ENGINE_INPUT" = "vendored" ]; then
          if [ "${{ github.event_name }}" = "pull_request_target" ]; then
            echo "::error::engine=vendored under pull_request_target executes untrusted PR-head code with a privileged token. Use engine=pinned (default), or the pull_request trigger."
            exit 1
          fi
          engine="$CONFIG_DIR/.cogpin/cogpin.py"
        else
          engine="$ACTION_PATH/cogpin.py"
        fi
        if [ ! -f "$engine" ]; then
          echo "::error::cogpin engine not found at $engine (engine=$ENGINE_INPUT)"
          exit 1
        fi
        echo "engine=$engine" >> "$GITHUB_OUTPUT"
        git fetch --no-tags --depth=200 origin "$DEFAULT_BRANCH" || true
        if ! git rev-parse --verify "origin/$DEFAULT_BRANCH" >/dev/null 2>&1; then
          echo "::warning::base ref origin/$DEFAULT_BRANCH unreachable — base-pinning degrades; set 'fetch-depth: 0' on actions/checkout."
        fi

    - name: cogpin check (pull request)
      if: github.event_name == 'pull_request'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        ENGINE: ${{ steps.prep.outputs.engine }}
        CONFIG_DIR: ${{ inputs.config-dir }}
        OWNER: ${{ github.repository_owner }}
        REPO: ${{ github.event.repository.name }}
        PR: ${{ github.event.pull_request.number }}
        HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        DEFAULT_BRANCH: ${{ inputs.default-branch }}
        REPORT_ONLY: ${{ inputs.report-only }}
      run: |
        set -euo pipefail
        report=""
        if [ "$REPORT_ONLY" = "true" ]; then
          echo "::warning title=cogpin report-only::cogpin is in REPORT-ONLY mode — findings are reported but the gate will NOT fail. Set report-only:false to enforce."
          report="--report-only"
        fi
        body="$CONFIG_DIR/.cogpin-pr-body.txt"
        reviews="$CONFIG_DIR/.cogpin-reviews.json"
        checks="$CONFIG_DIR/.cogpin-checks.json"
        gh pr view "$PR" --json body -q .body > "$body" || true
        # Reviews via GraphQL → the flat {login,state,commit_id,is_bot,author_association}
        # shape the engine consumes (REST/`gh pr view` can't surface is_bot / the review's commit oid).
        gh api graphql -f owner="$OWNER" -f repo="$REPO" -F pr="$PR" -f query='
          query($owner:String!,$repo:String!,$pr:Int!){
            repository(owner:$owner,name:$repo){
              pullRequest(number:$pr){
                reviews(first:100){ nodes{
                  state authorAssociation commit{oid} author{login __typename}
                }}}}}' \
          --jq '[.data.repository.pullRequest.reviews.nodes[] | {
                  login: .author.login, state: .state, commit_id: .commit.oid,
                  is_bot: (.author.__typename=="Bot"), author_association: .authorAssociation }]' \
          > "$reviews" || echo '[]' > "$reviews"
        # Fail CLOSED: `gh pr checks` exits non-zero when checks are failing/pending but still
        # writes the JSON — keep it; fall back to [] only when the output is genuinely empty
        # (no checks configured), never conflating "red/pending" with "none" (that would let
        # require_checks_green pass vacuously).
        gh pr checks "$PR" --json name,state > "$checks" 2>/dev/null || true
        [ -s "$checks" ] || echo '[]' > "$checks"
        # The flat approvals list must already be FRESH (on head), human, and non-author so a
        # stale or bot approval can't satisfy protected_path. The engine re-verifies via reviews.
        approvals="$(jq -r --arg head "$HEAD_SHA" --arg author "$PR_AUTHOR" \
          '[.[] | select(.state=="APPROVED" and (.is_bot|not) and .login!=$author and .commit_id==$head) | .login] | unique | join(",")' "$reviews")"
        python3 "$ENGINE" check --cwd "$CONFIG_DIR" \
          --pr-body-file "$body" \
          --reviews-file "$reviews" \
          --checks-file "$checks" \
          --approvals "$approvals" \
          --head-sha "$HEAD_SHA" \
          --pr-author "$PR_AUTHOR" \
          --default-branch "$DEFAULT_BRANCH" \
          $report

    - name: cogpin check (push)
      if: github.event_name != 'pull_request'
      shell: bash
      env:
        ENGINE: ${{ steps.prep.outputs.engine }}
        CONFIG_DIR: ${{ inputs.config-dir }}
        DEFAULT_BRANCH: ${{ inputs.default-branch }}
        REPORT_ONLY: ${{ inputs.report-only }}
      run: |
        set -euo pipefail
        report=""
        if [ "$REPORT_ONLY" = "true" ]; then
          echo "::warning title=cogpin report-only::cogpin is in REPORT-ONLY mode — findings are reported but the gate will NOT fail. Set report-only:false to enforce."
          report="--report-only"
        fi
        python3 "$ENGINE" check --cwd "$CONFIG_DIR" --default-branch "$DEFAULT_BRANCH" $report
