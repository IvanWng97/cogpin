# pixtuoid ‚Äî ratchet policy, a faithful port of scripts/check_dod.py (890 lines) into
# the ratchet primitive library. Each check notes its check_dod.py origin.
#
# Scope note: ratchet replaces the *closing-discipline* gate (the non-code-shaped
# lifecycle checks check_dod.py mechanizes) ‚Äî NOT pixtuoid's ~25 CI jobs +
# `just preflight`, which remain the compiled-code teeth. So there is no `run`
# block here; the teeth are pixtuoid's existing CI.
schema = 1

[repo]
default_branch = "main"
# _RUST_SRC_RE = ^crates/[^/]+/src/.*\.rs$
code = ["crates/*/src/**/*.rs"]
# _RUST_TEST_RE (approx) ‚Äî used only to *exempt* tests from the prod-print/write nets
tests = ["crates/*/tests/**/*.rs", "crates/*/src/**/*_tests.rs", "crates/*/src/**/tests.rs"]
# _DOC_RE ‚Äî docs-ish tree
docs = ["**/*.md", "docs/**", "site/**", "**/README.md", "**/CONTRIBUTING.md", "**/CHANGELOG.md"]
# public_surface() class ‚Äî cli.rs / config.rs / source/registry.rs
public_surface = ["crates/*/src/cli.rs", "crates/*/src/config.rs", "crates/*/src/**/source/registry.rs"]
claude_md = ["**/CLAUDE.md", "**/AGENTS.md"]

[meta]
base_pinned = true
bypass_env = "DOD_BYPASS"        # agent-layer escape hatch (CLAUDE.md); ‚Üí DOD-BYPASS: in attestation
commit_footer = 'Co-Authored-By:'  # every commit carries the footer
attestation_file = ".dod/attestation.md"  # reuse pixtuoid's existing attestation
feature_files = 3                  # >=3 changed files (or a new module) = feature-shaped

# ‚îÄ‚îÄ agent layer (PreToolUse) ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
# check_dod.py: command_has_no_verify() ‚Äî the binding PreToolUse deny. A transient
# command leaves no diff trace, so this is the real-time half.
[[check]]
id = "no-verify-command"
kind = "fact"
severity = "block"
layer = "agent"
primitive = "forbid_command"
pattern = '--no-verify\b|\bSKIP_PREFLIGHT=1\b|\bgit\s+commit\b[^|&;]*\s-\w*n\b'

# CLAUDE.md house rule: "if on main, branch first" + never commit straight to the
# shared checkout. The current branch is a live agent-layer fact; deny commit/push
# on main in real time (the fix is `git checkout -b` / a worktree).
[[check]]
id = "branch-first"
kind = "fact"
severity = "block"
layer = "agent"
primitive = "forbid_commit_on_branch"
branch = ["main"]
ops = ["commit", "push"]

# ‚îÄ‚îÄ change layer (pre-push + CI, authoritative, base-pinned) ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ

# check_dod.py: no_verify_violations() ‚Äî committed hook-skipping flag in a path
# where it would be a LIVE git op (.sh / .githooks / CI workflow / justfile).
# Source files (.rs/.py) are out of scope: the token there is data, not an op.
[[check]]
id = "no-verify-committed"
kind = "fact"
severity = "block"
primitive = "forbid_pattern"
pattern = '--no-verify\b|\bSKIP_PREFLIGHT=1\b'
scope = ["**/*.sh", ".githooks/**", ".github/workflows/**", "justfile", "Justfile"]
exempt = '^\s*#|\bban\b|\bforbid'   # comment / ban-documenting lines

# check_dod.py: prod_print_violations() ‚Äî a new println!/eprintln! in a Rust prod
# path, minus the CLI-presenter files, without a `// dod:allow(println)` pragma.
# (check_dod also strips string literals; dod strip_comments drops comments only,
# so a println! mentioned inside a "string" is a rare residual FP ‚Äî acceptable.)
[[check]]
id = "prod-print"
kind = "fact"
severity = "block"
primitive = "forbid_pattern"
pattern = '\b(?:println|eprintln)\s*!'
scope = "code"
strip_comments = true
exempt = '/(?:main|cli|validate|init_pack|doctor)\.rs$|/runtime/mod\.rs$|_tests?\.rs$|/tests?\.rs$|(^|/)tests/|build\.rs$|/examples/|dod:allow\(println\)'

# check_dod.py: settings_write_violations() ‚Äî a new fs write touching settings.json
# outside install/io.rs. Single-line co-occurrence (settings.json AND a write call)
# via lookahead. KNOWN LIMITATION (same as check_dod): line-scoped; a write split
# across two lines is missed ‚Äî the install/io.rs `pub(crate)` boundary + `just arch`
# are the primary enforcement, this is defense-in-depth.
[[check]]
id = "settings-write"
kind = "fact"
severity = "block"
primitive = "forbid_pattern"
pattern = '(?=.*settings\.json)(?=.*(?:fs::write|File::create|OpenOptions|\.write_all\(|\.write\())'
scope = "code"
strip_comments = true
exempt = 'crates/pixtuoid/src/install/io\.rs$|_tests?\.rs$|/tests?\.rs$|(^|/)tests/|[Tt]mp|tempdir'

# check_dod.py: two_lens_ok() at the merge/CI scope ‚Äî a code PR must carry a
# Two-lens-review block. EXISTENCE FLOOR (forcing function); whether the lenses are
# substantive is the advisory judge below. `when="code"` ‚Üí docs-only PRs are exempt;
# `pr_body is None` locally ‚Üí skipped, CI is the real gate.
[[check]]
id = "two-lens-review"
kind = "fact"
severity = "block"
primitive = "marker_present"
marker = '(?i)two-lens-review\s*:'
when = "code"

# check_dod.py: path_sep_warnings() ‚Äî a path stringified and compared against a
# '/'-bearing literal (the Windows mis-compare class). windows-test is the backstop.
[[check]]
id = "path-sep"
kind = "fact"
severity = "warn"
primitive = "forbid_pattern"
pattern = '(?=.*(?:to_string_lossy|\.display\(\)\.to_string)\(\))(?=.*"[^"]*/[^"]*")'
scope = ["crates/**/*.rs"]

# check_dod.py: public_surface_violations() ‚Äî a public surface (cli.rs / config.rs)
# changed without README + CLAUDE.md currency. Coarser than check_dod's added-line
# variant heuristic (file-level here), hence WARN; `need` is satisfied by either doc.
[[check]]
id = "docs-currency"
kind = "fact"
severity = "warn"
primitive = "path_requires"
when = ["crates/*/src/cli.rs", "crates/*/src/config.rs", "crates/*/src/**/source/registry.rs"]
need = ["**/README.md", "**/CLAUDE.md"]

# check_dod.py: ledger_touched() ‚Äî a code PR with no docs/REVIEW-LEDGER.md trace.
[[check]]
id = "ledger-trace"
kind = "fact"
severity = "warn"
primitive = "path_requires"
when = "code"
need = ["docs/REVIEW-LEDGER.md"]

# check_dod.py: deferrals_have_issue() ‚Äî deferral language with no nearby issue ref.
# (check_dod is per-line; this is per-PR-text, hence a coarser WARN.)
[[check]]
id = "deferral-has-issue"
kind = "fact"
severity = "warn"
primitive = "cooccur"
trigger = '\b(?:defer(?:red)?|follow-?up|punt(?:ed)?|TODO)\b'
require = '#\d+'

# check_dod.py: commit_footer (declared-but-inert in check_dod) ‚Äî activated here.
[[check]]
id = "commit-footer"
kind = "fact"
severity = "warn"
primitive = "commit_footer"

# ‚îÄ‚îÄ beyond check_dod.py: free ratchet baselines pixtuoid should want ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
# Not in check_dod.py, but cheap defense the engine gives for free.
[[check]]
id = "secret-scan"
kind = "fact"
severity = "block"
primitive = "secret_scan"
forbid_paths = [".env", ".env.*", "*.pem", "*.key", "id_rsa", "*.p12"]

# The bypass-proof keystone: gate-defining files can't change without an
# independent approval (PR context only; local pre-push skips, CI populates).
[[check]]
id = "protected-gate-files"
kind = "fact"
severity = "block"
primitive = "protected_path"
# post-adoption gate-defining files (check_dod.py is gone; the engine is vendored)
paths = ["ratchet.toml", ".ratchet/ratchet.py", "justfile", ".github/workflows/**", ".claude/settings.json", ".githooks/**", ".dod/**"]

# "Don't delete a test to go green." WARN (not block) here: pixtuoid reorganizes its
# 8 test binaries often, and `unless_paired_add` already suppresses a paired
# rename/reorg ‚Äî so a surviving hit is a genuinely unpaired test deletion worth a look.
[[check]]
id = "no-test-delete"
kind = "fact"
severity = "warn"
primitive = "forbid_delete"
scope = "tests"
unless_paired_add = true

# "Don't silently strip the safety net." A REMOVED `#[test]` / proptest / assertion
# line under the test tree ‚Äî the '-' twin of forbid_pattern. WARN until a fresh
# 0-false-block dry-run promotes it (the same caution that kept the port at 0 blocks).
[[check]]
id = "keep-test-assertions"
kind = "fact"
severity = "warn"
primitive = "forbid_removal"
pattern = '#\[test\]|proptest!|\bassert(?:_eq|_ne|_matches)?!'
scope = "tests"

# ‚îÄ‚îÄ agent-layer attestation (the Stop-hook checklist; `ratchet stop` enforces it) ‚îÄ‚îÄ
# check_dod.py: attestation_gaps() ‚Äî class-gated DoD boxes the agent ticks in
# .dod/attestation.md. `ratchet stop` blocks turn-end on an unticked REQUIRED box.
# always: TDD + Self-review ¬∑ feature: + Design + Impl-plan ¬∑ public_surface: + Docs-currency.
[[check]]
id = "attest-tdd"
kind = "advisory"
severity = "attest"
layer = "agent"
primitive = "attest"
class = "always"
box = "TDD"
prompt = "TDD: a failing test preceded the implementation."

[[check]]
id = "attest-self-review"
kind = "advisory"
severity = "attest"
layer = "agent"
primitive = "attest"
class = "always"
box = "Self-review"
prompt = "Self-review: you re-read the full diff for bugs/blast-radius."

[[check]]
id = "attest-design"
kind = "advisory"
severity = "attest"
layer = "agent"
primitive = "attest"
class = "feature"
box = "Design"
prompt = "Design exists for this feature-shaped change."

[[check]]
id = "attest-impl-plan"
kind = "advisory"
severity = "attest"
layer = "agent"
primitive = "attest"
class = "feature"
box = "Impl-plan"
prompt = "Impl-plan (against .github/prompts/impl-plan.prompt.md) exists."

[[check]]
id = "attest-docs-currency"
kind = "advisory"
severity = "attest"
layer = "agent"
primitive = "attest"
class = "public_surface"
box = "Docs-currency"
prompt = "Docs-currency: README + nearest CLAUDE.md updated for the public-surface change."

# check_dod.py: judge_prompt() ‚Äî the advisory substance-over-existence LLM-judge.
[[check]]
id = "judge-substance"
kind = "advisory"
severity = "judge"
layer = "change"
primitive = "judge"
prompt = "Are the two-lens review lenses DISTINCT and diff-grounded (not paraphrase), and is TDD evident?"
