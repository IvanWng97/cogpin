<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" width="900" height="360"><defs><marker id="a57606a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#57606a"/></marker><marker id="acf222e" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#cf222e"/></marker><marker id="a1a7f37" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#1a7f37"/></marker><marker id="a2563eb" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#2563eb"/></marker></defs><rect x="1" y="1" width="898" height="358" rx="16" fill="#ffffff" stroke="#d0d7de" stroke-width="1.5"/><text x="450.0" y="44" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="23" fill="#1f2328" font-weight="700" text-anchor="middle">The gate the diff can't loosen</text><text x="450.0" y="69" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12.5" fill="#57606a" font-weight="400" text-anchor="middle">One PR that leaks a secret AND edits cogpin.toml to disarm the check.</text><rect x="36" y="100" width="300" height="170" rx="10" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5"/><text x="186" y="128" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12.5" fill="#1f2328" font-weight="700" text-anchor="middle">PR #42 — the agent's diff</text><rect x="54" y="146" width="264" height="42" rx="10" fill="#fdecea" stroke="#cf222e" stroke-width="1.5"/><text x="186.0" y="171.0" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="11" fill="#cf222e" font-weight="400" text-anchor="middle"><tspan x="186.0" dy="0">+ leak.py:  AWS_KEY = "AKIA…"</tspan></text><rect x="54" y="200" width="264" height="52" rx="10" fill="#fdecea" stroke="#cf222e" stroke-width="1.5"/><text x="186.0" y="222.25" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="11" fill="#cf222e" font-weight="400" text-anchor="middle"><tspan x="186.0" dy="0">~ cogpin.toml</tspan><tspan x="186.0" dy="15.5">secret-scan:  block → warn</tspan></text><line x1="336" y1="150" x2="367" y2="150" stroke="#57606a" stroke-width="2" marker-end="url(#a57606a)"/><rect x="374" y="116" width="462" height="36" rx="10" fill="#ffffff" stroke="#d0d7de" stroke-width="1.5"/><text x="605.0" y="138.0" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" fill="#1f2328" font-weight="600" text-anchor="middle"><tspan x="605.0" dy="0">a naive gate reads config from the PR HEAD</tspan></text><rect x="374" y="158" width="462" height="36" rx="10" fill="#fdecea" stroke="#cf222e" stroke-width="1.5"/><text x="605.0" y="180.0" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" fill="#cf222e" font-weight="600" text-anchor="middle"><tspan x="605.0" dy="0">✗  0 blocks left → it merges the leak</tspan></text><line x1="336" y1="226" x2="367" y2="226" stroke="#1a7f37" stroke-width="2" marker-end="url(#a1a7f37)"/><rect x="374" y="208" width="462" height="36" rx="10" fill="#ffffff" stroke="#1a7f37" stroke-width="1.5"/><text x="605.0" y="230.0" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" fill="#1a7f37" font-weight="700" text-anchor="middle"><tspan x="605.0" dy="0">cogpin reads config from the BASE ref</tspan></text><rect x="374" y="250" width="462" height="36" rx="10" fill="#e8f6ec" stroke="#1a7f37" stroke-width="1.5"/><text x="605.0" y="272.0" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" fill="#1a7f37" font-weight="600" text-anchor="middle"><tspan x="605.0" dy="0">✓  secret still blocks → DENIED</tspan></text><text x="450.0" y="326" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12.5" fill="#1f2328" font-weight="600" text-anchor="middle">base-pinning: every commit is judged against the policy that existed BEFORE it.</text></svg>