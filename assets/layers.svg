<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 410" width="900" height="410"><defs><marker id="a57606a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#57606a"/></marker><marker id="acf222e" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#cf222e"/></marker><marker id="a1a7f37" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#1a7f37"/></marker><marker id="a2563eb" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#2563eb"/></marker></defs><rect x="1" y="1" width="898" height="408" rx="16" fill="#ffffff" stroke="#d0d7de" stroke-width="1.5"/><text x="450.0" y="44" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="21" fill="#1f2328" font-weight="700" text-anchor="middle">Two layers, one config — the same rules enforced twice</text><rect x="36" y="74" width="396" height="232" rx="12" fill="#eaf1fd" stroke="#2563eb" stroke-width="1.5"/><text x="54" y="100" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12.5" fill="#2563eb" font-weight="700" text-anchor="start">AGENT LAYER · real-time</text><rect x="52" y="116" width="175" height="66" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="1.5"/><text x="139.5" y="137.5" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" fill="#1f2328" font-weight="400" text-anchor="middle"><tspan x="139.5" dy="0">PreToolUse hook</tspan><tspan x="139.5" dy="15.5">deny --no-verify and</tspan><tspan x="139.5" dy="15.5">un-DoD'd push / merge</tspan></text><rect x="241" y="116" width="175" height="66" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="1.5"/><text x="328.5" y="137.5" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" fill="#1f2328" font-weight="400" text-anchor="middle"><tspan x="328.5" dy="0">Stop hook</tspan><tspan x="328.5" dy="15.5">block turn-end on</tspan><tspan x="328.5" dy="15.5">unticked attestation</tspan></text><text x="234" y="214" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" fill="#57606a" font-weight="400" text-anchor="middle">bypassable (and logged) — friction, not the final word</text><rect x="52" y="232" width="364" height="30" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="1.5"/><text x="234.0" y="251.0" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" fill="#1f2328" font-weight="400" text-anchor="middle"><tspan x="234.0" dy="0">mirrors what CI enforces, so you fix it before you push</tspan></text><line x1="432" y1="190" x2="461" y2="190" stroke="#57606a" stroke-width="2" marker-end="url(#a57606a)"/><text x="450.0" y="183" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="10" fill="#57606a" font-weight="600" text-anchor="middle">push / PR</text><rect x="468" y="74" width="396" height="232" rx="12" fill="#e8f6ec" stroke="#1a7f37" stroke-width="1.5"/><text x="486" y="100" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12.5" fill="#1a7f37" font-weight="700" text-anchor="start">CHANGE LAYER · pre-push + CI</text><rect x="486" y="116" width="360" height="50" rx="10" fill="#ffffff" stroke="#1a7f37" stroke-width="1.5"/><text x="666.0" y="145.0" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11.5" fill="#1f2328" font-weight="600" text-anchor="middle"><tspan x="666.0" dy="0">authoritative · base-pinned · ignores the bypass</tspan></text><rect x="486" y="176" width="360" height="50" rx="10" fill="#ffffff" stroke="#1a7f37" stroke-width="1.5"/><text x="666.0" y="205.0" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11.5" fill="#1f2328" font-weight="400" text-anchor="middle"><tspan x="666.0" dy="0">can't be relaxed by the same diff it gates</tspan></text><rect x="486" y="236" width="360" height="50" rx="10" fill="#ffffff" stroke="#1a7f37" stroke-width="1.5"/><text x="666.0" y="265.0" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11.5" fill="#1f2328" font-weight="400" text-anchor="middle"><tspan x="666.0" dy="0">a red CI check no env var can turn green</tspan></text><text x="450.0" y="344" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12.5" fill="#1f2328" font-weight="700" text-anchor="middle">block  =  only ungameable FACTS  (diff lines · the command · PR / commit metadata)</text><text x="450.0" y="368" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11.5" fill="#57606a" font-weight="400" text-anchor="middle">anything needing judgment (an LLM-judge, a self-checkbox) stays advisory — it warns, never blocks</text></svg>